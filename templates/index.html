<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Short Compilation</title>
  <style>
    :root {
      --bg: #f5f5f7;
      --card-bg: #fff;
      --text: #1d1d1f;
      --muted: #6e6e73;
      --accent: #0071e3;
      --border: #d2d2d7;
      --youtube: #ff0000;
      --tiktok: #010101;
      --instagram: #e4405f;
      --radius: 12px;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

    header { text-align: center; padding: 48px 16px 24px; }
    header h1 { font-size: 2rem; font-weight: 700; }
    header p { color: var(--muted); margin-top: 4px; }

    .search-box { display: flex; max-width: 600px; margin: 0 auto 24px; gap: 8px; padding: 0 16px; }
    .search-box input {
      flex: 1; padding: 12px 16px; font-size: 1rem; border: 1px solid var(--border);
      border-radius: var(--radius); outline: none; transition: border-color .2s;
    }
    .search-box input:focus { border-color: var(--accent); }
    .search-box button {
      padding: 12px 24px; font-size: 1rem; font-weight: 600; color: #fff;
      background: var(--accent); border: none; border-radius: var(--radius); cursor: pointer;
    }
    .search-box button:hover { opacity: .85; }

    .stats { text-align: center; color: var(--muted); font-size: .875rem; margin-bottom: 24px; }
    .stats span { margin: 0 8px; }

    .results { max-width: 700px; margin: 0 auto; padding: 0 16px 48px; }
    .spinner { text-align: center; padding: 32px; color: var(--muted); display: none; }
    .empty { text-align: center; padding: 32px; color: var(--muted); display: none; }

    .card {
      background: var(--card-bg); border-radius: var(--radius); padding: 16px 20px;
      margin-bottom: 12px; box-shadow: 0 1px 3px rgba(0,0,0,.08); display: flex; gap: 16px; align-items: flex-start;
    }
    .rank { font-size: 1.5rem; font-weight: 700; color: var(--accent); min-width: 32px; text-align: center; padding-top: 2px; }
    .card-body { flex: 1; min-width: 0; }
    .card-title { font-weight: 600; font-size: 1.05rem; margin-bottom: 6px; }
    .card-title a { color: var(--text); text-decoration: none; }
    .card-title a:hover { color: var(--accent); }

    .badge {
      display: inline-block; font-size: .7rem; font-weight: 700; text-transform: uppercase;
      padding: 2px 8px; border-radius: 6px; color: #fff; vertical-align: middle; margin-right: 6px;
    }
    .badge-youtube { background: var(--youtube); }
    .badge-tiktok { background: var(--tiktok); }
    .badge-instagram { background: var(--instagram); }

    .scores { display: flex; gap: 16px; font-size: .8rem; color: var(--muted); margin-top: 8px; flex-wrap: wrap; }
    .density-bar-wrap { display: flex; align-items: center; gap: 6px; }
    .density-bar { width: 80px; height: 6px; background: var(--border); border-radius: 3px; overflow: hidden; }
    .density-bar-fill { height: 100%; background: var(--accent); border-radius: 3px; }

    @media (max-width: 520px) {
      header h1 { font-size: 1.5rem; }
      .card { flex-direction: column; gap: 8px; }
      .rank { font-size: 1.2rem; }
    }
  </style>
</head>
<body>
  <header>
    <h1>Short Compilation</h1>
    <p>Search indexed short-form videos by topic</p>
  </header>

  <form class="search-box" id="searchForm">
    <input type="text" id="queryInput" placeholder="e.g. Tiffany design meaning" autocomplete="off">
    <button type="submit">Search</button>
  </form>

  <div class="stats" id="stats"></div>

  <div class="results" id="results">
    <div class="spinner" id="spinner">Searching...</div>
    <div class="empty" id="empty">No results found.</div>
    <div id="cards"></div>
  </div>

  <script>
    const $q = document.getElementById("queryInput");
    const $cards = document.getElementById("cards");
    const $spinner = document.getElementById("spinner");
    const $empty = document.getElementById("empty");
    const $stats = document.getElementById("stats");

    // Load stats on page load
    fetch("/api/stats")
      .then(r => r.json())
      .then(data => {
        const parts = [`${data.total_videos} videos indexed`];
        parts.push(`avg density ${data.avg_density.toFixed(2)}`);
        const pNames = Object.keys(data.platforms);
        if (pNames.length) {
          const pParts = pNames.map(p => `${p}: ${data.platforms[p]}`);
          parts.push(pParts.join(", "));
        }
        $stats.innerHTML = parts.map(p => `<span>${p}</span>`).join(" · ");
      })
      .catch(() => {});

    function badgeClass(platform) {
      const p = (platform || "").toLowerCase();
      if (p === "youtube") return "badge-youtube";
      if (p === "tiktok") return "badge-tiktok";
      if (p === "instagram") return "badge-instagram";
      return "";
    }

    function renderResults(results) {
      $cards.innerHTML = "";
      if (!results.length) { $empty.style.display = "block"; return; }
      results.forEach(r => {
        const densityPct = Math.round(r.density * 100);
        const card = document.createElement("div");
        card.className = "card";
        card.innerHTML = `
          <div class="rank">#${r.rank}</div>
          <div class="card-body">
            <div class="card-title">
              <span class="badge ${badgeClass(r.platform)}">${r.platform || "?"}</span>
              ${r.url ? `<a href="${r.url}" target="_blank" rel="noopener">${r.title || "Untitled"}</a>` : (r.title || "Untitled")}
            </div>
            <div class="scores">
              <div class="density-bar-wrap">
                Density:
                <div class="density-bar"><div class="density-bar-fill" style="width:${densityPct}%"></div></div>
                ${densityPct}%
              </div>
              <div>Similarity: ${r.similarity.toFixed(3)}</div>
              <div>Score: ${r.score.toFixed(4)}</div>
            </div>
          </div>`;
        $cards.appendChild(card);
      });
    }

    document.getElementById("searchForm").addEventListener("submit", function(e) {
      e.preventDefault();
      const q = $q.value.trim();
      if (!q) return;
      $cards.innerHTML = "";
      $empty.style.display = "none";
      $spinner.style.display = "block";
      fetch(`/api/search?q=${encodeURIComponent(q)}`)
        .then(r => r.json())
        .then(data => {
          $spinner.style.display = "none";
          if (data.error) { $empty.textContent = data.error; $empty.style.display = "block"; return; }
          renderResults(data);
        })
        .catch(() => {
          $spinner.style.display = "none";
          $empty.textContent = "Search failed.";
          $empty.style.display = "block";
        });
    });
  </script>
</body>
</html>
